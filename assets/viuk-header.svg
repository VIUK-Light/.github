<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-label="VIUK — 暗い部分を照らす。明るい未来へ。">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".52" stop-color="#07162f"/>
      <stop offset="1" stop-color="#0b3b91"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38bdf8"/>
      <stop offset=".5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="orb">
      <stop stop-color="#e0f2fe" stop-opacity=".7"/>
      <stop offset=".25" stop-color="#60a5fa" stop-opacity=".45"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#bfdbfe" stroke-opacity=".065"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="480" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="480" rx="30" fill="url(#grid)"/>
  <circle cx="1010" cy="115" r="225" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="1000" cy="116" r="112" fill="none" stroke="#bfdbfe" stroke-opacity=".2"/>
  <circle cx="1000" cy="116" r="76" fill="none" stroke="#bfdbfe" stroke-opacity=".32"/>
  <circle cx="1072" cy="91" r="7" fill="#f8fafc"/>
  <path d="M934 61l66 110 66-110h45l-111 184L889 61z" fill="none" stroke="url(#accent)" stroke-width="5"/>
  <rect x="74" y="66" width="94" height="30" rx="15" fill="#0f2d57" stroke="#60a5fa" stroke-opacity=".55"/>
  <text x="95" y="87" fill="#bfdbfe" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" letter-spacing="2">VIUK</text>
  <text x="72" y="218" fill="#f8fafc" font-family="Arial,'Hiragino Sans','Yu Gothic',sans-serif" font-size="61" font-weight="700">暗い部分を照らす。</text>
  <text x="72" y="292" fill="url(#accent)" font-family="Arial,'Hiragino Sans','Yu Gothic',sans-serif" font-size="61" font-weight="700">明るい未来へ。</text>
  <text x="76" y="347" fill="#cbd5e1" font-family="Arial,Helvetica,sans-serif" font-size="18" letter-spacing=".7">Light the unseen. Build a brighter future.</text>
  <path d="M76 403h404" stroke="url(#accent)" stroke-width="2"/>
  <text x="76" y="435" fill="#64748b" font-family="monospace" font-size="13" letter-spacing="2">SWIFT · ON-DEVICE AI · HUMAN EXPERIENCE</text>
</svg>
